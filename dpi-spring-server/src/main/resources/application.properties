# ====== Server Configuration ======
server.port=8080

# ====== Application Name ======
spring.application.name=dpi-spring-server

# ====== Actuator ======
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ====== File Upload (allow large PCAP files up to 100MB) ======
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ====== DPI Default Block Rules (comma-separated) ======
dpi.rules.blocked-ips=
dpi.rules.blocked-domains=facebook.com,youtube.com

# ====== ML Anomaly Detection ======
# Threshold above which a flow is classified as anomalous (0.0 - 1.0)
dpi.ml.anomaly-threshold=0.55
# Number of trees in the Isolation Forest (higher = more accurate but slower)
dpi.ml.isolation-forest-trees=200
# Number of synthetic normal training samples generated at startup
dpi.ml.training-samples=1000

# ====== Logging ======
logging.level.com.dpi=INFO
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
